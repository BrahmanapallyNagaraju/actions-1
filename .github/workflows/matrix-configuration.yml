# ref - https://docs.github.com/en/enterprise-server@3.19/actions/how-tos/write-workflows/choose-what-workflows-do/run-job-variations
name: Matrix Configuration

on:
    push:
    workflow_dispatch: 

jobs:
    deploy:
        strategy:
          matrix: # there will be 3*2 = 6 jobs created
            os: [ubuntu-latest, ubuntu-20.04, windows-latest]
            images: [hello-world, alpine]
        runs-on: ${{ matrix.os }}
        steps:
        - name: Echo Docker Details
          run: docker info
        
        - name: Running image in ${{ matrix.os }}
          run: docker run ${{ matrix.images }}
