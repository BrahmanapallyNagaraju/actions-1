name: Exploring Workflow Filters and activities

on:
    workflow_dispatch: 
    # schedule:
    #     - cron: "*/59 * * * *" 
    push:
        branches: 
            - main
            - '!feature/*' # ignoring pushing to any branch name starting with feature using !
        # branches-ignore: 
        #     - feature/* # feature/add-music, feature/updateImages
        #     - test/*    # test/ui/index, test/checkout/payment
    pull_request:
        types:
            - opened
            - closed
        paths-ignore: # (file or folder path) workflow will only run when a pull request that includes a change on any file other than README.md
            - README.md
        branches: 
            - main # configures workflow to only run on PRs that target specific branches

jobs:
    hello:
        runs-on: ubuntu-latest
        steps:
        - run: echo this workflo/job/step is executed for event type - ${{ github.event_name }}