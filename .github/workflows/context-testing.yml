name: Context testing

on: push

jobs:
    dump_contexts_to_log:
        runs-on: ubuntu-latest
        steps:
            - name: Dump GitHub context
              env:
                # toJSON(value) Returns a pretty-print JSON representation of value.
                GITHB_CONTEXT: ${{ toJson(github) }}
              run: echo "$GITHB_CONTEXT"

            - name: Dump job context
              env:
                JOB_CONTEXT: ${{ toJson(job) }}
              run: echo "$JOB_CONTEXT"

            - name: Dump steps context
              run: echo ${{ toJson(steps) }}

            - name: Dump runner context
              run: echo ${{ toJson(runner) }}

            - name: Dump secrets context
              run: echo ${{ toJson(secrets) }}

            - name: Dump strategy context
              run: echo ${{ toJson(strategy) }} # this won't execute since strategy was not used in this workflow